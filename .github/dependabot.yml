version: 2
updates:
  - package-ecosystem: nuget
    directory: "/api"
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    groups:
      vue:
        patterns:
          - "@vue/*"
          - "vue*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/api"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/web"
    schedule:
      interval: weekly

  - package-ecosystem: terraform
    directory: "/terraform"
    schedule:
      interval: weekly
