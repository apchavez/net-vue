name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:

  test-api:
    name: API — Tests and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          scanners: vuln
          exit-code: 1
          ignore-unfixed: true
          format: table

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Set up Java (for SonarScanner)
        if: github.actor != 'dependabot[bot]'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install SonarScanner for .NET
        if: vars.SONAR_ORGANIZATION != '' && github.actor != 'dependabot[bot]'
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud analysis
        if: vars.SONAR_ORGANIZATION != '' && github.actor != 'dependabot[bot]'
        working-directory: api
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /o:${{ vars.SONAR_ORGANIZATION }}
          /k:apchavez_net-vue
          /d:sonar.host.url=https://sonarcloud.io
          /d:sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
          /d:sonar.coverage.exclusions=**/ProductApi.Infrastructure/**,**/Migrations/**

      - name: Restore
        run: dotnet restore ProductApi.sln
        working-directory: api

      - name: Build
        run: dotnet build ProductApi.sln --no-restore -c Release
        working-directory: api

      - name: Unit tests with coverage
        run: >
          dotnet test tests/ProductApi.UnitTests
          --no-build -c Release
          --collect:"XPlat Code Coverage;Format=opencover"
          --results-directory ./coverage
        working-directory: api

      - name: Integration tests with coverage
        run: >
          dotnet test tests/ProductApi.IntegrationTests
          --no-build -c Release
          --collect:"XPlat Code Coverage;Format=opencover"
          --results-directory ./coverage
        working-directory: api

      - name: End SonarCloud analysis
        if: always() && vars.SONAR_ORGANIZATION != '' && github.actor != 'dependabot[bot]'
        working-directory: api
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end

      - name: Publish coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: api/coverage/
          retention-days: 30

  test-web:
    name: Web — Vue tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Format check
        run: npm run format:check
        working-directory: web

      - name: Type-check
        run: npx vue-tsc -b
        working-directory: web

      - name: Run unit tests
        run: npm run test
        working-directory: web

      - name: Production build
        run: npm run build
        working-directory: web

  e2e-web:
    name: Web — E2E Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Start dev server
        run: npm run dev -- --port 5173 &
        working-directory: web

      - name: Wait for dev server
        run: npx wait-on http://localhost:5173

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: web

      - name: Publish Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

  k8s-validate:
    name: Validate k8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Install kubeconform
        run: |
          curl -sLo /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/

      - name: Validate Helm chart (what actually gets deployed)
        run: |
          helm lint ./chart
          helm template product-api ./chart --namespace product-api \
            --set secrets.dbUser=test --set secrets.dbPassword=test \
            --set secrets.kafkaPassword=test --set secrets.redisPassword=test \
            | kubeconform -strict -ignore-missing-schemas -summary -

  terraform-validate:
    name: Terraform — fmt and validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -diff

      - name: Terraform init (no backend, no cloud credentials needed)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

  docker-api:
    name: Docker — API
    runs-on: ubuntu-latest
    needs: test-api
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-api
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign API image with Cosign (keyless)
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ github.repository }}-api@${{ steps.build.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}-api
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository }}-api@${{ steps.build.outputs.digest }}
          artifact-name: sbom-api-${{ github.sha }}.spdx.json
          output-file: sbom-api.spdx.json
          format: spdx-json

  docker-web:
    name: Docker — Web
    runs-on: ubuntu-latest
    needs: test-web
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-web
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Web image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign Web image with Cosign (keyless)
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ github.repository }}-web@${{ steps.build.outputs.digest }}"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}-web
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ github.repository }}-web@${{ steps.build.outputs.digest }}
          artifact-name: sbom-web-${{ github.sha }}.spdx.json
          output-file: sbom-web.spdx.json
          format: spdx-json
