apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: product-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "product-api.labels" . | nindent 4 }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: product-api
                port:
                  name: http
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: product-api
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: product-web
                port:
                  number: 80
